# Number of KafkaUI replicas. Use 1 when persistence is enabled (Recreate strategy).
replicaCount: 1

# Container image settings
image:
  repository: kafkaui
  tag: ""            # Defaults to Chart.appVersion
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

# Kubernetes ServiceAccount configuration
serviceAccount:
  create: true
  name: ""           # Defaults to fullname
  annotations: {}

# Pod-level security context (applies to all containers)
podSecurityContext:
  runAsNonRoot: true
  runAsGroup: 65534
  fsGroup: 65534

# Container-level security context
securityContext:
  runAsUser: 65534
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Extra environment variables (list of {name, value} or {name, valueFrom})
env: []
# Extra envFrom sources (configMapRef, secretRef)
envFrom: []

podAnnotations: {}

# Additional volumes and volume mounts for the container
extraVolumes: []
extraVolumeMounts: []

service:
  type: ClusterIP
  port: 8080

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: kafkaui.local
  tls: []

# CPU/memory resource requests and limits
resources: {}

# Persistent storage for dynamic cluster config. When disabled, an emptyDir is used.
persistence:
  enabled: false
  size: 100Mi
  storageClass: ""

# KafkaUI configuration (YAML). Mounted as /etc/kafkaui/config.yaml.
# Use --set-file config=config.yaml to load from a file.
config: |
  server:
    port: 8080
  clusters:
    - name: local
      bootstrap-servers: kafka:9092
